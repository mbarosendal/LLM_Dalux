name: Python tests

on:
  push:
    branches:
      - "main"
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Run unit tests
        run: uv run pytest -m "not integration"
